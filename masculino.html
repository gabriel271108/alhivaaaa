<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Productos Masculinos</title>
</head>
 <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #fdf6f9;
      color: #333;
    }

    header {
      background: linear-gradient(#9fe0c3,#5ec4b5);
      color: white;
      text-align: center;
      padding: 100px 20px;
    }

    header h1 {
      margin: 0;
      font-size: 2.5em;
    }

    header p {
      font-size: 1.1em;
    }

    .contenedor {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
    }

    .producto {
      background: white;
      border-radius: 15px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s;
    }

    .producto:hover {
      transform: translateY(-5px);
    }

    .producto img{
width:100%;
height:auto;
max-height:280px;
object-fit:contain;
background:white;
}

a{
text-decoration: none;
color: black;
}




    .producto h3 {
      margin: 15px;
      color: #0e0101;
    }

    .info {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
      padding: 0 15px;
    }

    .info p {
      margin: 10px 0;
      font-size: 0.95em;
    }

    .precio {
      font-weight: bold;
      color: #020202;
    }

    .producto.activo .info {
      max-height: 200px;
      padding-bottom: 15px;
    }

    footer {
      background-color: #f3d6e3;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
      font-size: 0.9em;
    }
    .whatsapp-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background-color: #25D366;
  color: white;
  padding: 15px 20px;
  border-radius: 50px;
  text-decoration: none;
  font-size: 16px;
  font-weight: bold;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  z-index: 1000;
  transition: transform 0.3s;
}

.whatsapp-btn:hover {
  transform: scale(1.1);
}

.logo {
  width: 120px;        
  height: 120px;       
  border-radius: 50%;  
  object-fit: cover;   
  margin-bottom: 15px;
}


.nombre-producto {
  font-size: 1.2rem;
  font-weight: 600;
  color: #eb32c9;
  text-align: center;
  margin: 12px 10px 8px;
  letter-spacing: 0.5px;
}

.producto {
  text-align: center;
}

.info p {
  font-size: 0.95rem;
  line-height: 1.4;
  color: #000000;
}
/* SECCION HERO */

.hero{
height:200vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(135deg,#9fe0c3,#5ec4b5);
color:white;
}

/* TITULO ANIMADO */

.titulo{
font-size:70px;
letter-spacing:6px;
margin-bottom:10px;
animation:aparecer 1.5s ease;
}

/* BIENVENIDA */

.bienvenida{
font-size:26px;
margin-bottom:10px;
animation:aparecer 2s ease;
}

/* ESLOGAN */

.eslogan{
font-size:18px;
opacity:0.9;
margin-bottom:40px;
animation:aparecer 2.5s ease;
}

/* BOTONES */

.botones{
display:flex;
gap:20px;
justify-content:center;
align-items:center;
flex-wrap:wrap;
animation:subir 3s ease;
}

.btn{
padding:15px 35px;
background:white;
color:#5ec4b5;
text-decoration:none;
border-radius:30px;
font-weight:bold;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
background:#ff6fb5;
color:white;
}

/* ANIMACIONES */

@keyframes aparecer{
from{
opacity:0;
transform:translateY(-30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes subir{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}
@media (max-width:600px){

.contenedor{
grid-template-columns:1fr;
}

.producto img{
max-height:350px;
}

}
  </style>

</section>
</header>

</html>
