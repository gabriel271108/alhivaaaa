body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#fffdfe,#15ed64,#00ad42);
margin:0;
padding:40px;
text-align:center;
}
.galeria{
animation: aparecer 0.8s ease;
}

@keyframes aparecer{
from{
opacity:0;
transform: translateY(20px);
}
to{
opacity:1;
transform: translateY(0);
}
}
body::before{
content:"";
position:fixed;
width:500px;
height:500px;
background:#ff2f92;
border-radius:50%;
top:-200px;
left:-200px;
opacity:0.25;
filter:blur(100px);
z-index:-1;
}

body::after{
content:"";
position:fixed;
width:500px;
height:500px;
background:#ff5cad;
border-radius:50%;
bottom:-200px;
right:-200px;
opacity:0.25;
filter:blur(100px);
z-index:-1;
}
.galeria{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:30px;
margin-top:40px;
}

  background: linear-gradient(135deg,#9fe0c3,#5ec4b5);

.titulo-producto{

}

}

.galeria{
  width:90%;
  max-width:1200px;
  margin:auto;

  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:25px;
}

.galeria img{
  width:100%;
  border-radius:15px;
  box-shadow:0 6px 15px rgba(0,0,0,0.2);
}
#visor{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:1000;
}

#visor img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

.zoom-img{
cursor:pointer;
transition:transform 0.3s;
}

.zoom-img:hover{
transform:scale(1.05);
}

<body>

<div class="titulo-producto">
  <h1>Moto</h1>
  <p>
  Cápsulas de metabolismo URO + soporte probiótico – Metabolismo, salud intestinal y energía sostenida – con picolinato de cromo, extracto de grano de café verde y probióticos específicos .
  </p>
</div>


<div class="galeria">

<img src="img\moto1.jpg" class="zoom-img">
<img src="img\moto2.jpg" class="zoom-img">
<img src="img\moto3.jpg" class="zoom-img">
<img src="img\moto4.jpg" class="zoom-img">
<img src="img\moto5.jpg" class="zoom-img">

</div>
<div id="visor">
<img id="imgGrande">
</div>
<script>

const imagenes = document.querySelectorAll(".zoom-img");
const visor = document.getElementById("visor");
const imgGrande = document.getElementById("imgGrande");

imagenes.forEach(img => {
  img.onclick = function(){
    visor.style.display = "flex";
    imgGrande.src = this.src;
  }
});

visor.onclick = function(){
  visor.style.display = "none";
}

</script>
<br>



</body>
